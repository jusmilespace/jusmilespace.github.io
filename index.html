<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ju Smile Apps - 應用程式中心</title>
    <meta name="description" content="Ju Smile Space 應用程式中心。下載熱量紀錄 Ju Smile App，或探索更多生活工具。">

    <meta property="og:title" content="Ju Smile Apps">
    <meta property="og:description" content="隨手就記，健康每一天。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://app.jusmilespace.com">

    <style>
        :root {
            --mint: #97d0ba;
            --mint-dark: #5c9c84;
            --charcoal: #1f2937;
            --text-sub: #6b7785;
            --bg: #f7faf9;
            --white: #ffffff;
        }

        /* --- 導航列基礎樣式 (完全同步官網) --- */
        nav {
            background: var(--white);
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            width: 100%;
            /* 確保寬度填滿 */
            z-index: 1000;
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--mint-dark);
            text-decoration: none;
            letter-spacing: -0.8px;
            display: flex;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            /* 使用 gap 取代固定 margin，自動產生適當間距 */
            align-items: center;
            /* 確保所有文字垂直置中 */
        }

        .nav-links a {
            text-decoration: none;
            color: var(--charcoal);
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            /* 防止文字折行 */
            transition: color 0.2s;
            /* 移除所有可能干擾的 margin */
            margin: 0 !important;
        }

        .nav-links a.active {
            color: var(--mint-dark);
        }

        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-toggle .bar {
            width: 25px;
            height: 3px;
            background-color: var(--charcoal);
            transition: 0.3s;
            border-radius: 2px;
        }

        /* --- 手機版修正 (768px 以下) --- */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex;
                z-index: 1001;
            }

            .nav-links {
                gap: 0;
                position: fixed;
                right: -100%;
                top: 0;
                width: 200px;
                height: 100vh;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                flex-direction: column;
                padding-top: 80px;
                transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
                box-shadow: -10px 0 30px rgba(0, 0, 0, 0.05);
            }

            .nav-links.active {
                right: 0;
            }

            .nav-links a {
                width: 100%;
                padding: 12px 30px;
                border-bottom: 1px solid #f9f9f9;
                text-align: left;
            }

            .menu-toggle.active .bar:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }

            .menu-toggle.active .bar:nth-child(2) {
                opacity: 0;
            }

            .menu-toggle.active .bar:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }
        }

        /* 修正原有 body 的 padding，因為現在有了 sticky nav */
        body {
            padding-top: 0 !important;
            /* 移除原本手動加的上方 padding */
        }

        /* 1. 🌟 字體修復與全域重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            /* 移除通用 * 的 !important，改在 html/body 層級精確定義 */
            font-family: "PingFang TC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            background-color: var(--bg);
            color: var(--charcoal);
            -webkit-font-smoothing: antialiased;
        }

        /* 2. 🌟 佈局修正：確保整體置中 */
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 水平居中 */
            min-height: 100vh;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            width: 100%;
            animation: fadeInDown 0.8s ease-out;
        }

        .hub-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--mint-dark);
            margin-bottom: 8px;
        }

        .hub-subtitle {
            color: var(--text-sub);
            font-size: 1.05rem;
        }

        /* 3. 🌟 卡片網格修正：強制置中 */
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 400px));
            gap: 30px;
            width: 100%;
            max-width: 850px;
            /* 限制寬度 */
            justify-content: center;
            /* 讓 Grid 項目在容器內居中 */
            margin: 0 auto 60px;
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid transparent;
            animation: fadeInUp 0.8s ease-out both;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(92, 156, 132, 0.15);
            border-color: var(--mint);
        }

        .app-logo-img {
            width: 90px;
            height: 90px;
            border-radius: 22px;
            margin-bottom: 20px;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .app-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .app-desc {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 24px;
            line-height: 1.6;
            flex-grow: 1;
        }

        .action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn-store-img {
            width: 100%;
            max-width: 200px;
            transition: transform 0.2s;
        }

        .btn-store-img:hover {
            transform: scale(1.02);
        }

        .btn-store-img img {
            width: 100%;
            height: auto;
        }

        .btn-web {
            background: white;
            color: var(--mint-dark);
            border: 2px solid var(--mint-dark);
            border-radius: 12px;
            padding: 10px 24px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            width: 100%;
            max-width: 200px;
            transition: all 0.2s;
        }

        .btn-web:hover {
            background: var(--mint-dark);
            color: white;
        }

        .tag-coming {
            background: #eee;
            color: #999;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
        }

        /* 頁尾修正 */
        footer {
            margin-top: auto;
            border-top: 1px solid #eee;
            padding-top: 30px;
            width: 100%;
            max-width: 800px;
            text-align: center;
            /* 確保內容水平置中 */
            margin-left: auto;
            /* 雙重保險置中 */
            margin-right: auto;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            /* 水平居中所有連結 */
            align-items: center;
            /* 垂直置中，解決 ☕️ 圖示造成的偏移 */
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            /* 手機版自動換行 */
        }

        .footer-links a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            /* 使用 flex 確保文字與圖示在同一水平線 */
            align-items: center;
            white-space: nowrap;
            /* 防止文字在奇怪的地方斷行 */
        }

        .footer-links a:hover {
            color: var(--mint-dark);
            text-decoration: underline;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="nav-container">
            <a href="https://jusmilespace.com" class="logo">Ju Smile Space</a>

            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <div class="nav-links" id="nav-links">
                <a href="https://jusmilespace.com">首頁</a>
                <a href="https://app.jusmilespace.com" class="active">產品介紹</a>
                <a href="https://jusmilespace.com/recipes.html">微笑料理</a>
                <a href="https://app.jusmilespace.com/support.html">支持我們</a>
                <a href="https://jusmilespace.com/privacy-policy.html" target="_blank">隱私權政策</a>
                <a href="https://jusmilespace.com#contact">聯絡我們</a>
            </div>
        </div>
    </nav>
    <header>
        <div class="hub-title">Ju Smile Apps</div>
        <p class="hub-subtitle">選擇您要使用的應用程式</p>
    </header>

    <div class="app-grid">

        <div class="card" style="animation-delay: 0.1s;">
            <img src="https://app.jusmilespace.com/ju-smile-app/icons/ju-smile-icon-192x192.png" alt="Ju Smile App Logo"
                class="app-logo-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
            <div class="app-icon-placeholder" style="display:none;">🥗</div>

            <div class="app-title">Ju Smile App</div>
            <p class="app-desc">
                手掌估算熱量、AI 辨識。<br>
                iOS 用戶請下載 App，Android 可使用網頁版。
            </p>

            <div class="action-area">
                <a href="https://apps.apple.com/app/id6757354366" target="_blank" class="btn-store-img"
                    aria-label="Download on the App Store">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Download_on_the_App_Store_Badge.svg"
                        alt="Download on the App Store">
                </a>

                <a href="/ju-smile-app/" class="btn-web">
                    開啟網頁版
                </a>
            </div>
        </div>

        <div class="card coming-soon" style="animation-delay: 0.2s;">
            <div class="app-icon-placeholder">☕</div>
            <div class="app-title">Coffee Diary</div>
            <p class="app-desc">
                紀錄每一杯咖啡製作的參數與風味。<br>專屬於您的咖啡實驗室。
            </p>
            <div class="tag-coming">Coming Soon</div>
        </div>

    </div>

    <footer>
        <div class="footer-links">
            <a href="https://jusmilespace.com">回到官網</a>
            <a href="/support.html">☕️ 支持我們</a>
            <a href="https://jusmilespace.com/privacy-policy.html" target="_blank">隱私權政策</a>
            <a href="https://jusmilespace.com#contact">聯絡我們</a>
        </div>
        <p class="copyright">&copy; 2026 Ju Smile Space. All rights reserved.</p>
    </footer>
    <script>
        const menuBtn = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        if (menuBtn && navLinks) {
            menuBtn.addEventListener('click', () => {
                menuBtn.classList.toggle('active');
                navLinks.classList.toggle('active');
            });

            // 點擊連結後自動關閉選單
            document.querySelectorAll('.nav-links a').forEach(link => {
                link.addEventListener('click', () => {
                    menuBtn.classList.remove('active');
                    navLinks.classList.remove('active');
                });
            });
        }
    </script>
</body>

</html>
